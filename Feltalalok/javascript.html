function megjelenit() {

    kutatok.sort((a, b) => a.fkod - b.fkod);
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    for (let i = 0; i < kutatok.length; i++) {
        let sor = `
            <tr>
                <td>${kutatok[i].fkod}</td>
                <td>${kutatok[i].nev}</td>
                <td>${kutatok[i].szul}</td>
                <td>${kutatok[i].meghal || ""}</td>
                <td>
                    <button onclick="torol(${i})">Törlés</button>
                    <button onclick="szerkeszt(${i})">Szerk.</button>
                </td>
            </tr>
        `;
        tabla.innerHTML += sor;
    }
}

function hozzaad() {
    let nev = document.getElementById("nev").value;
    let szul = document.getElementById("szul").value;
    let meghal = document.getElementById("meghal").value;

    if (nev === "" || szul === "") {
        alert("Kötelező mezők!");
        return;
    }

    let uj = {
        fkod: kutatok.length + 1,
        nev: nev,
        szul: parseInt(szul),
        meghal: meghal ? parseInt(meghal) : ""
    };

    kutatok.push(uj);
    megjelenit();
}

function torol(index) {
    kutatok.splice(index, 1);
    megjelenit();
}

function szerkeszt(index) {
    let ujNev = prompt("Új név:", kutatok[index].nev);
    let ujSzul = prompt("Új születési év:", kutatok[index].szul);
    let ujMeghal = prompt("Új halálozási év:", kutatok[index].meghal);

    if (ujNev != null) kutatok[index].nev = ujNev;
    if (ujSzul != null) kutatok[index].szul = parseInt(ujSzul);
    if (ujMeghal != null) kutatok[index].meghal = parseInt(ujMeghal);

    megjelenit();
}
