<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Kutatók CRUD - React</title>

<link rel="stylesheet" href="../style.css">

<script type="module">

import React, { useState, useEffect } 
from "https://esm.sh/react@18";

import ReactDOM 
from "https://esm.sh/react-dom@18/client";

const API_URL =
"http://w.apexracing01.infora.hu/Feltalalok/api1.php";

function App(){

  const [kutatok,setKutatok]=useState([]);
  const [nev,setNev]=useState("");
  const [szul,setSzul]=useState("");
  const [meghal,setMeghal]=useState("");

  const [modalOpen,setModalOpen]=useState(false);

  const [editData,setEditData]=useState({
      oldFkod:null,
      newFkod:"",
      nev:"",
      szul:"",
      meghal:""
  });

  async function loadData(){
      const res=await fetch(API_URL);
      const data=await res.json();
      setKutatok(data);
  }

  useEffect(()=>{ loadData(); },[]);

  async function addItem(){
      await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
              nev,
              szul:szul||null,
              meghal:meghal||null
          })
      });

      setNev("");
      setSzul("");
      setMeghal("");
      loadData();
  }

  async function deleteItem(fkod){
      if(!window.confirm("Biztosan törlöd?")) return;

      await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({_method:"DELETE",fkod})
      });

      loadData();
  }

  function openEditModal(item){
      setEditData({
          oldFkod:item.fkod,
          newFkod:item.fkod,
          nev:item.nev,
          szul:item.szul||"",
          meghal:item.meghal||""
      });

      setModalOpen(true);
  }

  // UPDATE
  async function saveEdit(){
      await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
              _method:"PUT",
              ...editData
          })
      });

      setModalOpen(false);
      loadData();
  }

  return React.createElement(
    "div",
    { className:"container" },

    React.createElement("h1",null,"Kutatók CRUD (React)"),

    React.createElement("div",{className:"form"},
      React.createElement("input",{
        placeholder:"Név",
        value:nev,
        onChange:e=>setNev(e.target.value)
      }),

      React.createElement("input",{
        type:"number",
        placeholder:"Születési év",
        value:szul,
        onChange:e=>setSzul(e.target.value)
      }),

      React.createElement("input",{
        type:"number",
        placeholder:"Halálozási év",
        value:meghal,
        onChange:e=>setMeghal(e.target.value)
      }),

      React.createElement("button",{onClick:addItem},"Hozzáadás")
    ),

    React.createElement("table",null,
      React.createElement("thead",null,
        React.createElement("tr",null,
          ["FKOD","Név","Született","Meghalt","Műveletek"]
            .map(t=>React.createElement("th",{key:t},t))
        )
      ),

      React.createElement("tbody",null,
        kutatok.map(k=>
          React.createElement("tr",{key:k.fkod},

            React.createElement("td",null,k.fkod),
            React.createElement("td",null,k.nev),
            React.createElement("td",null,k.szul||""),
            React.createElement("td",null,k.meghal||""),

            React.createElement("td",null,

              React.createElement("button",
                {onClick:()=>openEditModal(k)},
                "Szerkesztés"
              ),

              React.createElement("button",
                {
                  className:"delete",
                  onClick:()=>deleteItem(k.fkod)
                },
                "Törlés"
              )
            )
          )
        )
      )
    ),

    modalOpen
      ? React.createElement(
          "div",
          { className:"modal" },

          React.createElement(
            "div",
            { className:"modalContent" },

            React.createElement("h3",null,"Szerkesztés"),

            React.createElement("input",{
              type:"number",
              value:editData.newFkod,
              onChange:e=>setEditData({
                ...editData,
                newFkod:e.target.value
              })
            }),

            React.createElement("input",{
              value:editData.nev,
              onChange:e=>setEditData({
                ...editData,
                nev:e.target.value
              })
            }),

            React.createElement("input",{
              type:"number",
              value:editData.szul,
              onChange:e=>setEditData({
                ...editData,
                szul:e.target.value
              })
            }),

            React.createElement("input",{
              type:"number",
              value:editData.meghal,
              onChange:e=>setEditData({
                ...editData,
                meghal:e.target.value
              })
            }),

            React.createElement("button",
              {onClick:saveEdit},
              "Mentés"
            ),

            React.createElement("button",
              {onClick:()=>setModalOpen(false)},
              "Mégse"
            )
          )
        )
      : null
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(React.createElement(App));

</script>

</head>

<body>
<div id="root"></div>
</body>
</html>
